<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#050010"/>
    </radialGradient>
    <radialGradient id="eyeG3" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)"/>
  <circle cx="60" cy="40" r="2" fill="#e040fb" opacity=".3"/><circle cx="340" cy="60" r="1.5" fill="white" opacity=".4"/>
  <circle cx="50" cy="340" r="2" fill="#e040fb" opacity=".2"/><circle cx="350" cy="320" r="1.5" fill="white" opacity=".3"/>
  <!-- Hair -->
  <ellipse cx="200" cy="148" rx="82" ry="88" fill="#ce93d8"/>
  <ellipse cx="125" cy="200" rx="25" ry="80" fill="#ce93d8" transform="rotate(-5 125 200)"/>
  <ellipse cx="275" cy="200" rx="25" ry="80" fill="#ce93d8" transform="rotate(5 275 200)"/>
  <!-- Face -->
  <ellipse cx="200" cy="175" rx="50" ry="55" fill="#fce4d6"/>
  <!-- Eyes -->
  <ellipse cx="178" cy="165" rx="16" ry="20" fill="url(#eyeG3)"/>
  <ellipse cx="175" cy="159" rx="6" ry="8" fill="white"/>
  <ellipse cx="178" cy="170" rx="8" ry="10" fill="#0f0020"/>
  <circle cx="175" cy="166" r="4" fill="white"/>
  <ellipse cx="222" cy="165" rx="16" ry="20" fill="url(#eyeG3)"/>
  <ellipse cx="225" cy="159" rx="6" ry="8" fill="white"/>
  <ellipse cx="222" cy="170" rx="8" ry="10" fill="#0f0020"/>
  <circle cx="225" cy="166" r="4" fill="white"/>
  <!-- Blush -->
  <ellipse cx="165" cy="188" rx="10" ry="5" fill="#e1bee7" opacity=".4"/>
  <ellipse cx="235" cy="188" rx="10" ry="5" fill="#e1bee7" opacity=".4"/>
  <!-- Mouth -->
  <path d="M195 196 Q200 202 205 196" fill="none" stroke="#c88" stroke-width="2" stroke-linecap="round"/>
  <!-- Crown -->
  <path d="M175 98 L180 85 L190 95 L200 78 L210 95 L220 85 L225 98 Z" fill="#e040fb" opacity=".8"/>
  <circle cx="200" cy="90" r="3" fill="white" opacity=".5"/>
  <!-- Outfit -->
  <path d="M155 235 Q135 310 160 370 L240 370 Q265 310 245 235 Z" fill="#6a1b9a"/>
  <path d="M180 240 L220 240 L225 280 L175 280 Z" fill="#f3e5f5" opacity=".3"/>
  <!-- Moon -->
  <circle cx="320" cy="80" r="20" fill="#e040fb" opacity=".15"/>
  <circle cx="328" cy="75" r="18" fill="url(#bg3)"/>
  <!-- Floating orbs -->
  <circle cx="100" cy="150" r="8" fill="#e040fb" opacity=".1"/><circle cx="300" cy="280" r="12" fill="#ce93d8" opacity=".08"/>
  <circle cx="80" cy="280" r="6" fill="#e040fb" opacity=".12"/><circle cx="320" cy="180" r="10" fill="#ce93d8" opacity=".06"/>
  <text x="200" y="390" text-anchor="middle" fill="white" opacity=".8" font-family="sans-serif" font-size="14" font-weight="bold">ムーンライト</text>
</svg>
